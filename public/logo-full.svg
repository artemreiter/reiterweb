<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 48">
  <!-- Symbol -->
  <g>
    <!-- Outer ring -->
    <circle cx="24" cy="24" r="22" fill="none" stroke="#27272A" stroke-width="1"/>
    <!-- Signal line -->
    <path d="M8 32 L14 28 L18 30 L24 20 L30 14 L36 10 L40 8" fill="none" stroke="url(#logo-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Milestone dots -->
    <circle cx="24" cy="20" r="2" fill="#06060A" stroke="#8B5CF6" stroke-width="1.5"/>
    <circle cx="36" cy="10" r="2" fill="#06060A" stroke="#00FFD1" stroke-width="1.5"/>
    <!-- Terminal point -->
    <circle cx="40" cy="8" r="4" fill="#00FFD1" opacity="0.15"/>
    <circle cx="40" cy="8" r="2" fill="#00FFD1"/>
  </g>

  <!-- Wordmark -->
  <text x="58" y="30" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', ui-monospace, monospace" font-size="18" font-weight="700" fill="#FAFAFA" letter-spacing="-0.5">reiterweb</text>

  <defs>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF3366"/>
      <stop offset="40%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#00FFD1"/>
    </linearGradient>
  </defs>
</svg>
